<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Countdown Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>⏱️ Exam Countdown Timer</h1>
    
    <div class="clock" id="clock">00:00:00</div>
    
    <div class="status" id="status">Set your exam duration</div>

    <div class="time-inputs">
      <input type="number" id="hours" placeholder="HH" min="0" max="24">
      <input type="number" id="minutes" placeholder="MM" min="0" max="59">
      <input type="number" id="seconds" placeholder="SS" min="0" max="59">
    </div>

    <div class="buttons">
      <button class="start-btn" onclick="startCountdown()">🚀 Start Exam</button>
      <button class="reset-btn" onclick="resetTimer()">🔄 Reset</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
